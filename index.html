<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MediDate</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- html5-qrcode -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <!-- Tesseract.js -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- localForage -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
</head>
<body>
    <header class="app-header">
        <h1>MediDate</h1>
        <div id="status-indicator" class="status-offline"></div>
    </header>

    <main class="container">
        <!-- Scanner Section -->
        <section class="card" id="scanner-section">
            <div id="reader-container">
                <div id="reader"></div>
            </div>
            <div class="button-group">
                <button id="btn-scan-ocr" class="btn btn-secondary">バーコードをスキャン</button>
                <button id="btn-stop-scan" class="btn btn-danger hidden">スキャン停止</button>
            </div>
            <div id="scan-status" class="status-message"></div>
        </section>

        <!-- Result Form Section -->
        <section class="card form-section" id="form-section">
            <h2>読み取り結果・入力</h2>
            <form id="med-form">
                
                <div class="form-group">
                    <label>GS1コード (14桁)</label>
                    <input type="text" id="gs1-code">
                </div>
                
                <div class="form-group">
                    <label>医薬品名</label>
                    <input type="text" id="med-name" placeholder="マスターから自動取得">
                </div>

                <div class="form-group two-col">
                    <div>
                        <label>ロットナンバー</label>
                        <input type="text" id="lot-number">
                    </div>
                    <div>
                        <label>期限 (年月)</label>
                        <input type="month" id="exp-date">
                    </div>
                </div>

                <div class="form-group highlight-box" id="action-date-group" style="display:none; background-color: #fff3cd; border-color: #ffeeba;">
                    <label id="action-date-label">実施年月</label>
                    <input type="month" id="action-date">
                </div>

                <div class="form-group">
                    <label>区分フラグ (自動計算用)</label>
                    <select id="category-flag" required>
                        <option value="【３カ月未満】通常">【３カ月未満】通常</option>
                        <option value="【２カ月未満】経腸栄養">【２カ月未満】経腸栄養</option>
                        <option value="【６カ月後】半錠・粉砕・脱カプセル">【６カ月後】半錠・粉砕・脱カプセル</option>
                        <option value="【１カ月後】他容器移し替え">【１カ月後】他容器移し替え</option>
                        <option value="【１カ月未満】抗インフルエンザ等">【１カ月未満】抗インフルエンザ薬、抗生剤・抗真菌剤（内服薬）・新型コロナウイルス経口薬、鎮咳剤、去痰剤、鎮咳去痰剤（内服）</option>
                        <option value="【１週間後】開封後精製水">【１週間後】開封後精製水</option>
                        <option value="【１日後】開封後滅菌精製水">【１日後】開封後滅菌精製水</option>
                        <option value="【同月】薬局医薬品・高度管理等">【同月】薬局医薬品・高度管理医療機器・管理医療機器</option>
                        <option value="【その他】その他">【その他】その他</option>
                    </select>
                </div>

                <div class="form-group highlight-box">
                    <label>廃棄予定年月</label>
                    <input type="month" id="disposal-date" readonly style="background-color: #e9ecef;">
                </div>

                <div class="form-group two-col">
                    <div>
                        <label>棚番</label>
                        <input type="text" id="shelf-number" placeholder="例: A-1">
                    </div>
                    <div>
                        <label>数量 <span style="color:var(--danger-color);font-size:0.8rem;">*</span></label>
                        <input type="text" id="quantity" placeholder="タップして入力" readonly required style="cursor: pointer; background-color: #fff;">
                    </div>
                </div>

                <div class="form-group">
                    <label>単位</label>
                    <input type="text" id="unit" placeholder="マスターから自動取得">
                </div>

                <div class="form-group">
                    <label>メモ (複数選択可)</label>
                    <div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:10px;">
                        <label><input type="checkbox" name="memo-check" value="棚上有"> 棚上有</label>
                        <label><input type="checkbox" name="memo-check" value="バラ有"> バラ有</label>
                        <label><input type="checkbox" id="memo-other-check" value="その他"> その他</label>
                    </div>
                    <input type="text" id="memo-other-text" class="hidden" placeholder="その他のメモを記入">
                </div>

                <button type="submit" id="btn-submit" class="btn btn-success btn-large">スプレッドシートに保存</button>
            </form>
        </section>
    </main>

    <!-- Overlay Loader -->
    <div id="loader" class="loader-overlay hidden">
        <div class="spinner"></div>
        <p id="loader-text">処理中...</p>
    </div>

    <!-- Configuration Modal -->
    <button id="btn-settings" class="settings-fab">⚙️</button>
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h3>設定</h3>
            <div class="form-group">
                <label>GAS Webhook URL</label>
                <input type="password" id="gas-url" placeholder="https://script.google.com/macros/s/.../exec">
                <small>※ スプレッドシート連携用のURLを入力してください</small>
            </div>
            <div class="form-group">
                <label>合言葉 (シークレットトークン)</label>
                <input type="password" id="secret-token" placeholder="GASで設定した合言葉">
            </div>
            <hr style="margin: 1rem 0; border: none; border-top: 1px solid #ccc;">
            <div class="form-group">
                <button id="btn-sync-master" class="btn btn-secondary btn-large">マスターデータをダウンロード (手動更新)</button>
                <small id="sync-status" style="display:block; margin-top:5px; color:var(--text-muted);"></small>
            </div>
            <div class="button-group">
                <button id="btn-save-settings" class="btn btn-primary">保存して閉じる</button>
            </div>
        </div>
    </div>

    <!-- Calculator Modal -->
    <div id="calc-modal" class="modal hidden">
        <div class="modal-content calc-content" style="max-width: 400px; padding: 15px; border-radius: 20px; background-color: #f2fcfc; display: flex; flex-direction: column; height: 80vh; max-height: 600px;">
            <div class="calc-display-container">
                <div id="calc-expression"></div>
                <div id="calc-display">0</div>
            </div>
            <div class="calc-grid">
                <button type="button" class="calc-btn btn-cyan" data-val="C">AC</button>
                <button type="button" class="calc-btn btn-light-purple" data-val="(">(</button>
                <button type="button" class="calc-btn btn-light-purple" data-val=")">)</button>
                <button type="button" class="calc-btn btn-light-purple" data-op="/">÷</button>

                <button type="button" class="calc-btn btn-light-blue" data-val="7">7</button>
                <button type="button" class="calc-btn btn-light-blue" data-val="8">8</button>
                <button type="button" class="calc-btn btn-light-blue" data-val="9">9</button>
                <button type="button" class="calc-btn btn-light-purple" data-op="*">×</button>

                <button type="button" class="calc-btn btn-light-blue" data-val="4">4</button>
                <button type="button" class="calc-btn btn-light-blue" data-val="5">5</button>
                <button type="button" class="calc-btn btn-light-blue" data-val="6">6</button>
                <button type="button" class="calc-btn btn-light-purple" data-op="-">−</button>

                <button type="button" class="calc-btn btn-light-blue" data-val="1">1</button>
                <button type="button" class="calc-btn btn-light-blue" data-val="2">2</button>
                <button type="button" class="calc-btn btn-light-blue" data-val="3">3</button>
                <button type="button" class="calc-btn btn-light-purple" data-op="+">+</button>

                <button type="button" class="calc-btn btn-light-blue" data-val="0">0</button>
                <button type="button" class="calc-btn btn-light-blue" data-val=".">.</button>
                <button type="button" class="calc-btn btn-light-blue" data-val="BS">⌫</button>
                <button type="button" class="calc-btn btn-dark-purple" data-val="=">=</button>
            </div>
            <button type="button" id="btn-calc-confirm" class="btn btn-primary" style="margin-top: auto; padding: 15px; font-size: 1.2rem; border-radius: 30px;">入力確定</button>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
